<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashtar Bakery</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff8f0;
  text-align: center;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 40px;
  color: #8b4513;
}

p {
  font-size: 18px;
  color: #555;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: #ff7a00;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #e56700;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ashtar Bakery 🍞</h1>
  <p>Fresh baked goods every day</p>

  <button onclick="contact()">Contact Us</button>

  <p id="email"></p>
</div>

<script>
function contact() {
  document.getElementById("email").innerHTML =
    "Email: info@ashtarbakery.online";
}
</script>

</body>
</html>
